name: 🚀 Uruchom Generator (Menu)

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: '1. Link do folderu Google Drive z Twoimi plikami .png (Folder musi być publiczny dla każdego z linkiem!)'
        required: true
      namespace:
        description: '2. Podaj NAMESPACE dla modeli (np. gui, custom)'
        required: true
        default: 'gui'
      nazwa_paczki:
        description: '3. Podaj NAZWĘ dla paczki zasobów'
        required: true
        default: 'Custom Items Pack'
      opis_paczki:
        description: '4. Podaj OPIS dla paczki'
        required: true
        default: 'Wygenerowane przez GitHub Actions'
      przedmiot_bazowy:
        description: '5. Wybierz przedmiot bazowy z Javy (Vanilla)'
        required: true
        default: 'red_dye'
        type: choice
        options:
          - red_dye
          - grey_stained_glass
          - iron_nugget
          - paper

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu z repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalacja narzędzia do pobierania z Google Drive
        run: pip install gdown

      - name: Automatyczne pobieranie plików .png użytkownika z Google Drive
        run: |
          mkdir -p obrazy_png
          gdown --folder "${{ github.event.inputs.gdrive_url }}" -O obrazy_png/

      - name: Uruchomienie skryptu Pythona z danymi z menu GitHuba
        run: |
          python generator.py \
            --namespace "${{ github.event.inputs.namespace }}" \
            --nazwa "${{ github.event.inputs.nazwa_paczki }}" \
            --opis "${{ github.event.inputs.opis_paczki }}" \
            --baza "${{ github.event.inputs.przedmiot_bazowy }}"

      - name: Zapisanie gotowych paczek jako plik do pobrania (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.nazwa_paczki }}
          path: wyjscie/
