<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Generator - Panel Drag & Drop</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a252f; color: #ecf0f1; text-align: center; padding: 40px; margin: 0; }
        .container { max-width: 550px; margin: 0 auto; background-color: #2c3e50; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #2ecc71; margin-top: 0; }
        .drop-zone { border: 3px dashed #7f8c8d; padding: 40px; text-align: center; color: #bdc3c7; border-radius: 6px; background-color: #1a252f; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .drop-zone.dragover { border-color: #2ecc71; color: white; background-color: #2c3e50; }
        textarea { width: 100%; height: 150px; background-color: #1a252f; color: #2ecc71; border: 1px solid #7f8c8d; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 20px; box-sizing: border-box; resize: none; }
        .btn { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 15px; display: none; }
        .btn:hover { background-color: #27ae60; }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Minecraft Panel Przeciągania Tekstur</h2>
    <p style="color: #bdc3c7; font-size: 14px;">Przeciągnij grafikę .png, aby błyskawicznie uzyskać kod sesji</p>

    <!-- 🟢 JEDYNE OKNO DRAG & DROP -->
    <div class="drop-zone" id="drop-zone">
        📂 Przeciągnij i upuść plik .png tutaj<br>lub kliknij, aby wybrać z dysku
    </div>
    <input type="file" id="file-input" accept=".png" style="display: none;">

    <textarea id="output-text" readonly placeholder="Tutaj pojawi się bezpieczny kod tekstury po upuszczeniu pliku..."></textarea>
    
    <div id="status">Czekam na plik graficzny...</div>
    <button class="btn" id="btn-copy">📋 SKOPIUJ KOD DO GITHUBA</button>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const btnCopy = document.getElementById('btn-copy');
    const statusDiv = document.getElementById('status');
    const outputText = document.getElementById('output-text');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) { konwertujPlikNaTekst(e.dataTransfer.files[0]); }
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) { konwertujPlikNaTekst(e.target.files[0]); }
    });

    // ⚙️ CAŁKOWICIE LOKALNA KONWERSJA OFFLINE (0% internetu, 0% blokad CORS)
    function konwertujPlikNaTekst(file) {
        if (!file.name.toLowerCase().endsWith('.png')) {
            alert("❌ Możesz wgrywać wyłącznie pliki w formacie .png!");
            return;
        }

        statusDiv.innerText = "⏳ Generowanie bezpiecznego kodu tekstury...";
        statusDiv.style.color = "#f1c40f";

        const reader = new FileReader();
        reader.onload = function(event) {
            const pelny_kod = event.target.result;
            // Wyciągamy czysty kod tekstowy obrazka (usuwamy niepotrzebny nagłówek)
            const czysty_tekst = pelny_kod.split(',')[1]; 
            
            outputText.value = czysty_tekst;
            dropZone.innerHTML = `🎵 Przetworzono plik: <br><span style="color:#2ecc71;">${file.name}</span>`;
            statusDiv.innerText = "Gotowe! Skopiuj kod i wklej go do formularza na GitHubie.";
            statusDiv.style.color = "#2ecc71";
            btnCopy.style.display = "block"; // Pokazujemy przycisk kopiowania
            
            outputText.select();
        };
        reader.readAsDataURL(file);
    }

    // Kopiowanie kodu jednym przyciskiem do schowka
    btnCopy.addEventListener('click', () => {
        outputText.select();
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert('✔️ Kod tekstury został skopiowany! Wklej go teraz na GitHubie.');
        }).catch(() => {
            document.execCommand('copy');
            alert('✔️ Kod tekstury został skopiowany! Wklej go teraz na GitHubie.');
        });
    });
</script>
</body>
</html>
