<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft SaaS Pack Creator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a252f; color: #ecf0f1; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #2c3e50; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: left; }
        h2 { text-align: center; color: #2ecc71; margin-top: 0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; color: #bdc3c7; }
        input[type="text"], select { width: 100%; padding: 10px; border-radius: 4px; border: none; background-color: #34495e; color: white; box-sizing: border-box; font-size: 14px; }
        select { cursor: pointer; }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .radio-option { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        .drop-zone { border: 3px dashed #7f8c8d; padding: 40px; text-align: center; color: #bdc3c7; border-radius: 6px; background-color: #1a252f; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .drop-zone.dragover { border-color: #2ecc71; color: white; background-color: #34495e; }
        .btn { width: 100%; padding: 14px; background-color: #2ecc71; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 25px; transition: background 0.2s; }
        .btn:hover { background-color: #27ae60; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; color: #f1c40f; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Minecraft Panel Tworzenia Paczek</h2>
    <p style="text-align: center; color: #bdc3c7; font-size: 14px; margin-bottom: 25px;">Zarządzaj swoim serwerem bezpośrednio z przeglądarki</p>

    <!-- 1. TRYB PRACY (Nowa Paczka / Multi-Add) -->
    <div class="form-group">
        <label>Wybierz tryb generowania:</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="tryb" value="multi_add" checked> ➕ Dopisz do istniejącej paczki (Multi-Add)
            </label>
            <label class="radio-option">
                <input type="radio" name="tryb" value="nowa_paczka"> 🧹 Stwórz nową paczkę od zera
            </label>
        </div>
    </div>

    <!-- 2. NAZWA PACZKI -->
    <div class="form-group">
        <label>Nazwa paczki zasobów (Resource Pack Name):</label>
        <input type="text" id="pack-name" value="Custom Items Pack">
    </div>

    <!-- 3. OPIS PACZKI -->
    <div class="form-group">
        <label>Opis paczki (Wyświetlany w mcmeta i manifeście):</label>
        <input type="text" id="pack-desc" value="Wygenerowane modułowo przez SaaS">
    </div>

    <!-- 4. WYBÓR PRZEDMIOTU BAZOWEGO -->
    <div class="form-group">
        <label>Wybierz przedmiot bazowy z Javy (Vanilla Item ID):</label>
        <select id="base-item">
            <option value="red_dye">red_dye (Czerwony barwnik)</option>
            <option value="grey_stained_glass">grey_stained_glass (Szare szkło)</option>
            <option value="iron_nugget">iron_nugget (Samorodek żelaza)</option>
            <option value="paper">paper (Papier)</option>
        </select>
    </div>

    <!-- 5. NAMESPACE -->
    <div class="form-group">
        <label>Namespace modeli (Prefix, np. gui, custom):</label>
        <input type="text" id="namespace" value="gui">
    </div>

    <!-- 6. OKNO DRAG & DROP NA PLIK PNG -->
    <div class="form-group">
        <label>Wgraj swoją teksturę:</label>
        <div class="drop-zone" id="drop-zone">
            📂 Przeciągnij i upuść plik .png tutaj<br>lub kliknij, aby wybrać z dysku
        </div>
        <input type="file" id="file-input" accept=".png" style="display: none;">
    </div>

    <!-- STATUS I PRZYCISK URUCHOMIENIA -->
    <div id="status">Czekam na uzupełnienie formularza i przeciągnięcie pliku...</div>
    <button class="btn" id="btn-generate">🔥 WYGENERUJ PROJEKT W CHMURZE</button>
</div>

<script>
    // ⚙️ POŁĄCZENIE Z TWOIM REPOZYTORIUM NA GITHUBIE
    const GITHUB_USER = "Arkadiusz617v2"; 
    const GITHUB_REPO = "CIG";           
    const GITHUB_TOKEN = "TWÓJ_TOKEN_GITHUB_PAT"; // Wklej swój token PAT z uprawnieniami repo [1.1]

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const btnGenerate = document.getElementById('btn-generate');
    const statusDiv = document.getElementById('status');

    let wybranyPlik = null;

    // Obsługa przeciągania plików (Drag & Drop)
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) { wczytajPlik(e.dataTransfer.files[0]); }
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) { wczytajPlik(e.target.files[0]); }
    });

    function wczytajPlik(file) {
        if (!file.name.toLowerCase().endsWith('.png')) {
            alert("❌ Możesz wgrywać wyłącznie pliki z rozszerzeniem .png!");
            return;
        }
        wybranyPlik = file;
        dropZone.innerHTML = `🎵 Wczytano plik: <br><span style="color:#2ecc71;">${file.name}</span>`;
        statusDiv.innerText = "Formularz i tekstura gotowe. Kliknij przycisk poniżej, aby uruchomić serwer.";
        statusDiv.style.color = "#2ecc71";
    }

    // 🚀 OFICJALNE WYPCHNIĘCIE DANYCH DO GITHUBA PRZEZ REPOSITORY DISPATCH (Omija blokady CORS)
    btnGenerate.addEventListener('click', () => {
        if (!wybranyPlik) { alert("❌ Najpierw przeciągnij plik .png do okna Drag & Drop!"); return; }

        statusDiv.innerText = "⏳ Przygotowywanie danych i wysyłanie bezpiecznego żądania do GitHuba...";
        statusDiv.style.color = "#f1c40f";
        btnGenerate.disabled = true;

        // Pobieramy wszystkie wartości z pól tekstowych strony
        const trybPracy = document.querySelector('input[name="tryb"]:checked').value;
        const nazwaPaczki = document.getElementById('pack-name').value.trim();
        const opisPaczki = document.getElementById('pack-desc').value.trim();
        const przedmiotBazowy = document.getElementById('base-item').value;
        const prefixNamespace = document.getElementById('namespace').value.trim().toLowerCase();
        
        // Wyciągamy czystą nazwę pliku, bez rozszerzenia, bezpieczną dla Minecrafta
        const nazwaPlikuCzysta = wybranyPlik.name.replace(".png", "").replace(".PNG", "").toLowerCase().replace(/[^a-z0-9_]/g, "");

        const reader = new FileReader();
        reader.onload = async function(event) {
            const arrayBuffer = event.target.result;
            const bytes = new Uint8Array(arrayBuffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
            
            // Kodowanie binarne wymagane przez sieć API GitHuba (Niewidoczne dla użytkownika) [1.1]
            const daneBinarneObrazka = btoa(binary); 

            // Punkt końcowy API wyzwalania zdarzeń w Twoim repozytorium
            const url_api = `https://github.com{GITHUB_USER}/${GITHUB_REPO}/dispatches`;

            try {
                const response = await fetch(url_api, {
                    method: "POST",
                    headers: {
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event_type: "uruchom_generator_SaaS", // Nazwa zdarzenia dla pliku .yml
                        client_payload: {
                            mode: trybPracy,
                            packname: nazwaPaczki,
                            description: opisPaczki,
                            base: przedmiotBazowy,
                            namespace: prefixNamespace,
                            item_name: nazwaPlikuCzysta,
                            tekstura_raw: daneBinarneObrazka // Przekazujemy czysty obrazek w bezpiecznym pakiecie tekstowym
                        }
                    })
                });

                if (response.status === 204 || response.status === 200) {
                    statusDiv.innerHTML = `🎉 SUKCES! Serwer w chmurze ruszył w trybie: <span style='color:white;'>${trybPracy.toUpperCase()}</span>.<br>Wszystkie klocki za około 30 sekund pojawią się w folderze <span style='color:white;'>GEN/${nazwaPaczki.replace(/ /g, "_")}/</span> w Twoim projekcie!`;
                    statusDiv.style.color = "#2ecc71";
                } else {
                    statusDiv.innerText = "❌ GitHub odrzucił żądanie. Sprawdź czy Twój token PAT jest poprawny.";
                    statusDiv.style.color = "#e74c3c";
                    btnGenerate.disabled = false;
                }
            } catch (err) {
                statusDiv.innerText = "❌ Brak łączności sieciowej z GitHub API: " + err;
                statusDiv.style.color = "#e74c3c";
                btnGenerate.disabled = false;
            }
        };
        reader.readAsArrayBuffer(wybranyPlik);
    });
</script>
</body>
</html>
