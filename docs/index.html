<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Generator - Konwerter Tekstur</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a252f; color: #ecf0f1; text-align: center; padding: 40px; }
        .drop-zone { border: 3px dashed #7f8c8d; max-width: 500px; margin: 20px auto; padding: 40px; border-radius: 8px; cursor: pointer; background-color: #2c3e50; transition: border-color 0.2s; }
        .drop-zone.dragover { border-color: #2ecc71; background-color: #34495e; }
        textarea { width: 100%; max-width: 500px; height: 150px; background-color: #1a252f; color: #2ecc71; border: 1px solid #7f8c8d; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; box-sizing: border-box; }
        .btn { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <h2>🎨 Konwerter Tekstur do Base64 (Offline)</h2>
    <p>Przeciągnij plik graficzny, aby wygenerować kod dla generatora.</p>

    <!-- 🟢 OKNO DRAG & DROP -->
    <div class="drop-zone" id="drop-zone">
        📂 Przeciągnij i upuść plik .png lub .webp tutaj<br>lub kliknij, aby wybrać z dysku
        <input type="file" id="file-input" accept=".png,.webp" style="display: none;">
    </div>

    <!-- OKNO Z WYGENEROWANYM KODEM TEKSTOWYCH -->
    <textarea id="output-text" readonly placeholder="Tutaj pojawi się Twój kod Base64 po upuszczeniu pliku..."></textarea>
    <br>
    <button class="btn" id="btn-copy">KOPIUJ KOD</button>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const outputText = document.getElementById('output-text');
        const btnCopy = document.getElementById('btn-copy');

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                przetworzPlik(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                przetworzPlik(e.target.files[0]);
            }
        });

        // ⚙️ LOGIKA OFFLINE: Zamiana obrazka na kod Base64 w ułamku sekundy
        function przetworzPlik(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                // Wyciągamy czysty kod tekstowy (usuwamy nagłówek data:image/...)
                const pelny_kod = event.target.result;
                const czysty_base64 = pelny_kod.split(',')[1];
                outputText.value = czysty_base64;
                outputText.select();
            };
            reader.readAsDataURL(file);
        }

        // Kopiowanie do schowka komputera
        btnCopy.addEventListener('click', () => {
            outputText.select();
            document.execCommand('copy');
            alert('✔️ Kod Base64 został skopiowany do schowka!');
        });
    </script>
</body>
</html>
